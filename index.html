<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExamHub - Sistem Manajemen Ujian</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Space Grotesk', 'sans-serif'],
            body: ['DM Sans', 'sans-serif'],
          },
          colors: {
            bg: '#0c1222',
            surface: '#131c31',
            card: '#1a2540',
            border: '#2a3a5c',
            muted: '#6b7c9c',
            accent: '#00d4aa',
            'accent-dark': '#00a888',
            warning: '#ffb020',
            danger: '#ff4757',
            info: '#3b82f6',
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --bg: #0c1222;
      --surface: #131c31;
      --card: #1a2540;
      --border: #2a3a5c;
      --accent: #00d4aa;
    }
    * { box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: #e2e8f0; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    
    .bg-mesh {
      background-image: 
        radial-gradient(ellipse at 10% 20%, rgba(0, 212, 170, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 80%, rgba(59, 130, 246, 0.06) 0%, transparent 50%);
    }
    .grid-pattern {
      background-image: 
        linear-gradient(rgba(42, 58, 92, 0.2) 1px, transparent 1px),
        linear-gradient(90deg, rgba(42, 58, 92, 0.2) 1px, transparent 1px);
      background-size: 50px 50px;
    }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    
    .animate-fade { animation: fadeIn 0.5s ease-out forwards; }
    .animate-float { animation: float 3s ease-in-out infinite; }
    .delay-1 { animation-delay: 0.1s; opacity: 0; }
    .delay-2 { animation-delay: 0.2s; opacity: 0; }
    .delay-3 { animation-delay: 0.3s; opacity: 0; }
    
    .glass { background: rgba(26, 37, 64, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(42, 58, 92, 0.5); }
    .input-field { transition: all 0.25s ease; }
    .input-field:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.15); outline: none; }
    
    .btn-primary { position: relative; overflow: hidden; transition: all 0.25s ease; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0, 212, 170, 0.25); }
    .btn-primary:active { transform: translateY(0); }
    
    .card-hover { transition: all 0.3s ease; }
    .card-hover:hover { transform: translateY(-3px); border-color: rgba(0, 212, 170, 0.3); box-shadow: 0 12px 32px rgba(0, 0, 0, 0.3); }
    
    .nav-link { position: relative; transition: all 0.25s ease; }
    .nav-link::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); transform: scaleY(0); transition: transform 0.25s ease; }
    .nav-link:hover::before, .nav-link.active::before { transform: scaleY(1); }
    .nav-link:hover, .nav-link.active { background: rgba(0, 212, 170, 0.08); color: var(--accent); }
    
    .spinner { border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .toast { animation: toastIn 0.35s ease-out; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
    
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
  </style>
</head>
<body class="min-h-screen bg-bg">
  <div class="fixed inset-0 bg-mesh pointer-events-none"></div>
  <div class="fixed inset-0 grid-pattern pointer-events-none opacity-40"></div>
  <div id="app" class="relative min-h-screen"></div>
  <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2 pointer-events-none"></div>

  <script>
    // =============================================
    // CONFIG - PENTING: GANTI DENGAN URL ANDA
    // =============================================
    const CONFIG = {
      APP_NAME: 'Exam SMPN 1 DP',
      // GANTI DENGAN URL GOOGLE APPS SCRIPT ANDA
      // Contoh: https://script.google.com/macros/s/AKfycb.../exec
      API_URL: 'https://script.google.com/macros/s/AKfycby6ZNolwnOwNS28s49tHPBDjQET6w3l362bfGfJZ0D-GJ9kwk_Xb91jHyIl1tRE2TUb/exec', 
      
      SESSION_KEY: 'examhub_session',
      STUDENT_SESSION_KEY: 'examhub_student',
      
      ROUTES: {
        HOME: 'home',
        ADMIN_LOGIN: 'admin/login',
        ADMIN_DASHBOARD: 'admin/dashboard',
        ADMIN_JADWAL: 'admin/jadwal',
        SISWA_LOGIN: 'siswa/login',
        SISWA_DASHBOARD: 'siswa/dashboard',
        NOTFOUND: 'notfound'
      },
      
      // Data demo jika API tidak terhubung
      DEMO_ADMIN: { username: 'admin', password: 'admin123', name: 'Administrator' },
      DEMO_STUDENTS: [
        { nisn: '0012345678', nama: 'Ahmad Rizki Pratama', kelas: 'XII-IPA-1' },
        { nisn: '0012345679', nama: 'Siti Nurhaliza', kelas: 'XII-IPA-2' },
        { nisn: '0012345680', nama: 'Budi Santoso', kelas: 'XII-IPS-1' },
        { nisn: '0012345681', nama: 'Dewi Lestari', kelas: 'XI-IPA-1' }
      ],
      
      KELAS_LIST: ['X-IPA-1', 'X-IPA-2', 'X-IPS-1', 'XI-IPA-1', 'XI-IPA-2', 'XI-IPS-1', 'XII-IPA-1', 'XII-IPA-2', 'XII-IPS-1'],
      RUANG_LIST: ['Ruang 101', 'Ruang 102', 'Ruang 103', 'Ruang 201', 'Ruang 202', 'Lab Komputer', 'Aula']
    };

    // =============================================
    // UTILITY FUNCTIONS
    // =============================================
    const Utils = {
      generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 9); },
      formatDate(date) {
        if (!date) return '-';
        return new Intl.DateTimeFormat('id-ID', { day: '2-digit', month: 'long', year: 'numeric' }).format(new Date(date));
      },
      escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      },
      debounce(fn, delay) {
        let timeout;
        return (...args) => { clearTimeout(timeout); timeout = setTimeout(() => fn(...args), delay); };
      },
      generateToken() {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        let token = '';
        for (let i = 0; i < 6; i++) token += chars.charAt(Math.floor(Math.random() * chars.length));
        return token;
      },
      isValidUrl(string) { try { new URL(string); return true; } catch { return false; } }
    };

    // =============================================
    // TOAST NOTIFICATION
    // =============================================
    const Toast = {
      container: null,
      init() { this.container = document.getElementById('toast-container'); },
      show(message, type = 'success', duration = 4000) {
        const id = Utils.generateId();
        const icons = {
          success: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>',
          error: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>',
          warning: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>',
          info: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'
        };
        const colors = {
          success: 'bg-accent/15 border-accent/40 text-accent',
          error: 'bg-danger/15 border-danger/40 text-red-400',
          warning: 'bg-warning/15 border-warning/40 text-yellow-400',
          info: 'bg-info/15 border-info/40 text-blue-400'
        };

        const toast = document.createElement('div');
        toast.id = `toast-${id}`;
        toast.className = `toast pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-xl border ${colors[type]} backdrop-blur-sm shadow-lg`;
        toast.innerHTML = `
          <span class="flex-shrink-0">${icons[type]}</span>
          <span class="text-sm font-medium flex-1">${Utils.escapeHtml(message)}</span>
          <button onclick="Toast.close('${id}')" class="p-1 hover:bg-white/10 rounded-lg transition-colors"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
        `;
        this.container.appendChild(toast);
        if (duration > 0) setTimeout(() => this.close(id), duration);
        return id;
      },
      close(id) {
        const toast = document.getElementById(`toast-${id}`);
        if (toast) { toast.style.opacity = '0'; toast.style.transform = 'translateX(100%)'; setTimeout(() => toast.remove(), 300); }
      }
    };

    // =============================================
    // LOCAL STORE (Fallback / Demo Mode)
    // =============================================
    const Store = {
      jadwal: {
        KEY: 'examhub_jadwal_v2',
        getAll() { try { return JSON.parse(localStorage.getItem(this.KEY)) || []; } catch { return []; } },
        getByKelas(kelas) { return this.getAll().filter(j => j.kelas === kelas); },
        findByToken(token, kelas) { return this.getAll().find(j => j.token === token && j.kelas === kelas); },
        add(item) { const data = this.getAll(); data.push(item); localStorage.setItem(this.KEY, JSON.stringify(data)); },
        update(id, updates) { const data = this.getAll(); const idx = data.findIndex(j => j.id === id); if (idx !== -1) { data[idx] = { ...data[idx], ...updates }; localStorage.setItem(this.KEY, JSON.stringify(data)); } },
        delete(id) { const data = this.getAll().filter(j => j.id !== id); localStorage.setItem(this.KEY, JSON.stringify(data)); }
      }
    };

    // =============================================
    // API - JSONP METHOD (CORS SAFE)
    // =============================================
    const API = {
      loading: false,
      requestId: 0,

      async request(action, data = {}) {
        this.loading = true;
        this.updateLoader();

        try {
          // Jika tidak ada API_URL, gunakan demo mode
          if (!CONFIG.API_URL) {
            return await this.demoRequest(action, data);
          }

          // Gunakan JSONP untuk menghindari CORS
          return await this.jsonpRequest(action, data);

        } catch (error) {
          console.error('API Error:', error);
          this.loading = false;
          this.updateLoader();
          return { success: false, error: error.message };
        }
      },

      jsonpRequest(action, data) {
        return new Promise((resolve, reject) => {
          const callbackName = 'jsonp_callback_' + (this.requestId++);
          const script = document.createElement('script');
          
          // Build URL parameters
          const params = new URLSearchParams({ action, callback: callbackName });
          Object.keys(data).forEach(key => {
            if (data[key] !== undefined && data[key] !== null && data[key] !== '') {
              params.append(key, data[key]);
            }
          });
          
          script.src = CONFIG.API_URL + '?' + params.toString();
          
          // Timeout handler
          const timeout = setTimeout(() => {
            delete window[callbackName];
            document.body.removeChild(script);
            this.loading = false;
            this.updateLoader();
            reject(new Error('Request timeout'));
          }, 15000);

          // Success callback
          window[callbackName] = (result) => {
            clearTimeout(timeout);
            delete window[callbackName];
            document.body.removeChild(script);
            this.loading = false;
            this.updateLoader();
            resolve(result);
          };
          
          // Error handler
          script.onerror = () => {
            clearTimeout(timeout);
            delete window[callbackName];
            document.body.removeChild(script);
            this.loading = false;
            this.updateLoader();
            reject(new Error('Network error'));
          };
          
          document.body.appendChild(script);
        });
      },

      async demoRequest(action, data) {
        await new Promise(r => setTimeout(r, 400));
        
        switch (action) {
          case 'login':
            if (data.username === CONFIG.DEMO_ADMIN.username && data.password === CONFIG.DEMO_ADMIN.password) {
              return { success: true, user: CONFIG.DEMO_ADMIN };
            }
            return { success: false, error: 'Username atau password salah' };

          case 'loginSiswa':
            const student = CONFIG.DEMO_STUDENTS.find(s => s.nisn === data.nisn);
            if (student) return { success: true, student };
            return { success: false, error: 'NISN tidak ditemukan' };

          case 'getJadwal':
            return { success: true, data: Store.jadwal.getAll() };

          case 'getJadwalByKelas':
            return { success: true, data: Store.jadwal.getByKelas(data.kelas) };

          case 'createJadwal':
            const newJadwal = { id: Utils.generateId(), ...data, createdAt: new Date().toISOString() };
            Store.jadwal.add(newJadwal);
            return { success: true, data: newJadwal };

          case 'updateJadwal':
            Store.jadwal.update(data.id, data);
            return { success: true };

          case 'deleteJadwal':
            Store.jadwal.delete(data.id);
            return { success: true };

          default:
            return { success: false, error: 'Unknown action' };
        }
      },

      updateLoader() {
        document.querySelectorAll('.api-loader').forEach(el => { el.style.display = this.loading ? 'flex' : 'none'; });
        document.querySelectorAll('.btn-api').forEach(el => { el.disabled = this.loading; });
      }
    };

    // =============================================
    // AUTHENTICATION
    // =============================================
    const Auth = {
      session: null,
      init() { this.session = this.getSession(); },
      getSession() { try { const d = localStorage.getItem(CONFIG.SESSION_KEY); return d ? JSON.parse(d) : null; } catch { return null; } },
      async login(username, password) {
        const result = await API.request('login', { username, password });
        if (result.success) {
          const session = { ...result.user, loginAt: new Date().toISOString() };
          localStorage.setItem(CONFIG.SESSION_KEY, JSON.stringify(session));
          this.session = session;
        }
        return result;
      },
      logout() { localStorage.removeItem(CONFIG.SESSION_KEY); this.session = null; Router.navigate(CONFIG.ROUTES.ADMIN_LOGIN); },
      isAuthenticated() { return this.session !== null; }
    };

    const StudentAuth = {
      session: null,
      init() { this.session = this.getSession(); },
      getSession() { try { const d = localStorage.getItem(CONFIG.STUDENT_SESSION_KEY); return d ? JSON.parse(d) : null; } catch { return null; } },
      async login(nisn) {
        const result = await API.request('loginSiswa', { nisn });
        if (result.success) {
          const session = { ...result.student, loginAt: new Date().toISOString() };
          localStorage.setItem(CONFIG.STUDENT_SESSION_KEY, JSON.stringify(session));
          this.session = session;
        }
        return result;
      },
      logout() { localStorage.removeItem(CONFIG.STUDENT_SESSION_KEY); this.session = null; Router.navigate(CONFIG.ROUTES.SISWA_LOGIN); },
      isAuthenticated() { return this.session !== null; },
      getStudent() { return this.session; }
    };

    // =============================================
    // MODAL HELPER
    // =============================================
    const Modal = {
      open(id) { const m = document.getElementById(id); if (m) { m.classList.remove('hidden'); document.body.style.overflow = 'hidden'; } },
      close(id) { const m = document.getElementById(id); if (m) { m.classList.add('hidden'); document.body.style.overflow = ''; } }
    };

    // =============================================
    // COMPONENTS
    // =============================================
    const Components = {
      loadingOverlay() { return '<div class="api-loader fixed inset-0 bg-black/60 backdrop-blur-sm z-50 items-center justify-center hidden"><div class="glass rounded-2xl p-8 flex flex-col items-center gap-4"><div class="spinner w-10 h-10"></div><span class="text-muted">Memproses...</span></div></div>'; },
      
      adminSidebar(currentRoute) {
        const menus = [
          { route: CONFIG.ROUTES.ADMIN_DASHBOARD, label: 'Dashboard', icon: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>' },
          { route: CONFIG.ROUTES.ADMIN_JADWAL, label: 'Jadwal Ujian', icon: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>' }
        ];
        return `
          <aside id="sidebar" class="fixed left-0 top-0 h-full w-64 bg-surface border-r border-border z-40 transform -translate-x-full lg:translate-x-0 transition-transform duration-300">
            <div class="flex flex-col h-full">
              <div class="p-5 border-b border-border"><a href="#${CONFIG.ROUTES.HOME}" class="flex items-center gap-3"><div class="w-10 h-10 rounded-xl bg-gradient-to-br from-accent to-teal-500 flex items-center justify-center"><svg class="w-6 h-6 text-bg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg></div><div><span class="font-display font-bold text-white text-lg">ExamHub</span><span class="block text-xs text-muted">Admin Panel</span></div></a></div>
              <nav class="flex-1 p-4 space-y-1">${menus.map(m => `<a href="#${m.route}" class="nav-link flex items-center gap-3 px-4 py-3 rounded-lg text-muted hover:text-white transition-colors ${currentRoute === m.route ? 'active' : ''}">${m.icon}<span class="font-medium">${m.label}</span></a>`).join('')}</nav>
              <div class="p-4 border-t border-border"><div class="flex items-center gap-3 mb-3 px-2"><div class="w-9 h-9 rounded-full bg-accent/20 flex items-center justify-center"><span class="font-display font-bold text-accent text-sm">${(Auth.session?.name || 'A').charAt(0)}</span></div><div class="flex-1 min-w-0"><p class="font-medium text-white text-sm truncate">${Utils.escapeHtml(Auth.session?.name || 'Admin')}</p><p class="text-xs text-muted">Administrator</p></div></div><button onclick="Auth.logout()" class="w-full flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg bg-danger/10 text-danger hover:bg-danger/20 transition-colors text-sm font-medium"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>Keluar</button></div>
            </div>
          </aside>
          <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-30 hidden lg:hidden"></div>
        `;
      },

      adminNavbar(currentRoute) {
        const titles = { [CONFIG.ROUTES.ADMIN_DASHBOARD]: 'Dashboard', [CONFIG.ROUTES.ADMIN_JADWAL]: 'Manajemen Jadwal' };
        return `<header class="sticky top-0 z-20 bg-surface/80 backdrop-blur-xl border-b border-border"><div class="flex items-center justify-between px-4 lg:px-6 py-4"><button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-lg hover:bg-card transition-colors"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg></button><h1 class="font-display font-bold text-xl text-white">${titles[currentRoute] || 'Admin'}</h1><div class="hidden sm:flex items-center gap-2 px-3 py-1.5 rounded-lg bg-card text-sm"><span class="w-2 h-2 rounded-full bg-accent"></span><span class="text-muted">Online</span></div></div></header>`;
      },

      statCard(title, value, icon, gradient, delay) {
        return `<div class="card-hover glass rounded-2xl p-5 animate-fade delay-${delay}"><div class="flex items-start justify-between"><div><p class="text-muted text-sm mb-1">${title}</p><p class="font-display font-bold text-3xl text-white">${value}</p></div><div class="w-11 h-11 rounded-xl ${gradient} flex items-center justify-center">${icon}</div></div></div>`;
      }
    };

    // =============================================
    // PAGES
    // =============================================
    const Pages = {
      home() {
        return `
          <div class="min-h-screen flex items-center justify-center p-4">
            <div class="w-full max-w-md text-center">
              <div class="mb-10 animate-fade">
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-br from-accent to-teal-500 mb-6 animate-float"><svg class="w-10 h-10 text-bg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg></div>
                <h1 class="font-display font-bold text-4xl text-white mb-3">${CONFIG.APP_NAME}</h1>
                <p class="text-muted">Sistem Manajemen Ujian Sekolah Terintegrasi</p>
              </div>
              <div class="space-y-4 animate-fade delay-1">

            <div class="bg-gradient-to-br from-info/20 to-blue-500/10 border-b border-border"><div class="p-4"><div class="flex items-center justify-between mb-4"><a href="#${CONFIG.ROUTES.HOME}" class="p-2 -ml-2 rounded-lg hover:bg-card/50 transition-colors"><svg class="w-6 h-6 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg></a><button onclick="StudentAuth.logout()" class="p-2 rounded-lg hover:bg-card/50 text-muted hover:text-danger transition-colors"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg></button></div><div class="flex items-center gap-4"><div class="w-14 h-14 rounded-full bg-info/20 flex items-center justify-center"><span class="font-display font-bold text-info text-xl">${student?.nama?.charAt(0) || 'S'}</span></div><div><h1 class="font-display font-bold text-xl text-white">${Utils.escapeHtml(student?.nama || 'Siswa')}</h1><div class="flex items-center gap-2 mt-1"><span class="text-sm text-muted">NISN:</span><span class="text-sm font-mono text-white">${Utils.escapeHtml(student?.nisn || '-')}</span></div></div></div><div class="mt-4 px-4 py-2 rounded-xl bg-info/10 border border-info/20 inline-block"><span class="text-sm text-info">Kelas: <strong>${Utils.escapeHtml(student?.kelas || '-')}</strong></span></div></div></div>
            <div class="p-4">
              <div class="flex items-center justify-between mb-4 animate-fade"><h2 class="font-display font-semibold text-lg text-white">Jadwal Ujian</h2><span class="text-sm text-muted">${jadwalList.length} ujian</span></div>
              ${jadwalList.length > 0 ? `<div class="space-y-3">${jadwalList.map((j, i) => `<div class="card-hover glass rounded-2xl p-4 animate-fade delay-${Math.min(i + 1, 4)}"><div class="flex items-start justify-between mb-3"><div><h3 class="font-semibold text-white">${Utils.escapeHtml(j.mapel || 'Mata Pelajaran')}</h3><p class="text-sm text-muted">${Utils.escapeHtml(j.ruang)}</p></div><span class="px-3 py-1 rounded-lg bg-accent/20 text-accent text-sm font-medium">${Utils.escapeHtml(j.token)}</span></div><div class="flex items-center gap-4 text-sm text-muted mb-4"><span class="flex items-center gap-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>${j.tanggal ? Utils.formatDate(j.tanggal) : '-'}</span><span class="flex items-center gap-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>${j.waktu || '-'}</span></div><button onclick="openTokenModal('${j.id}', '${Utils.escapeHtml(j.mapel || 'Ujian')}')" class="w-full py-3 rounded-xl bg-gradient-to-r from-accent to-teal-500 text-bg font-semibold flex items-center justify-center gap-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>Masuk Ujian</button></div>`).join('')}</div>` : `<div class="glass rounded-2xl p-8 text-center animate-fade"><svg class="w-16 h-16 mx-auto text-muted/30 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg><p class="text-muted mb-1">Belum ada jadwal ujian</p><p class="text-sm text-muted/50">untuk kelas ${Utils.escapeHtml(student?.kelas || '-')}</p></div>`}
            </div>
          </div>
          <div id="token-modal" class="fixed inset-0 z-50 hidden"><div class="fixed inset-0 bg-black/60 backdrop-blur-sm" onclick="Modal.close('token-modal')"></div><div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-sm p-4 animate-fade"><div class="glass rounded-2xl overflow-hidden"><div class="px-6 py-4 border-b border-border"><h3 class="font-display font-semibold text-lg text-white text-center">Masukkan Token</h3><p id="token-modal-subtitle" class="text-sm text-muted text-center mt-1"></p></div><form id="token-form" class="p-6"><input type="hidden" name="jadwalId" id="token-jadwal-id"><input type="text" name="tokenInput" id="token-input" maxlength="6" class="input-field w-full px-4 py-4 rounded-xl bg-card border border-border text-white text-center text-2xl font-mono uppercase tracking-widest placeholder-muted/50" placeholder="XXXXXX" required><p class="text-xs text-muted text-center mt-2">Masukkan 6 karakter token ujian</p><div class="pt-4 flex gap-3"><button type="button" onclick="Modal.close('token-modal')" class="flex-1 py-3 rounded-xl bg-card border border-border text-muted hover:text-white transition-colors font-medium">Batal</button><button type="submit" class="btn-primary btn-api flex-1 py-3 rounded-xl bg-gradient-to-r from-accent to-teal-500 text-bg font-semibold">Masuk</button></div></form></div></div></div>
        `;
      },

      notfound() {
        return `<div class="min-h-screen flex items-center justify-center p-4"><div class="text-center"><div class="mb-6 animate-float"><svg class="w-24 h-24 mx-auto text-muted/20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div><h1 class="font-display font-bold text-5xl text-white mb-2 animate-fade">404</h1><p class="text-muted mb-6 animate-fade delay-1">Halaman tidak ditemukan</p><a href="#${CONFIG.ROUTES.HOME}" class="btn-primary inline-flex items-center gap-2 px-6 py-3 rounded-xl bg-gradient-to-r from-accent to-teal-500 text-bg font-semibold animate-fade delay-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Kembali</a></div></div>`;
      }
    };

    // =============================================
    // ROUTER
    // =============================================
    const Router = {
      currentRoute: null,
      routes: {
        [CONFIG.ROUTES.HOME]: Pages.home,
        [CONFIG.ROUTES.ADMIN_LOGIN]: Pages.adminLogin,
        [CONFIG.ROUTES.ADMIN_DASHBOARD]: Pages.adminDashboard,
        [CONFIG.ROUTES.ADMIN_JADWAL]: Pages.adminJadwal,
        [CONFIG.ROUTES.SISWA_LOGIN]: Pages.siswaLogin,
        [CONFIG.ROUTES.SISWA_DASHBOARD]: Pages.siswaDashboard,
        [CONFIG.ROUTES.NOTFOUND]: Pages.notfound
      },
      adminRoutes: [CONFIG.ROUTES.ADMIN_DASHBOARD, CONFIG.ROUTES.ADMIN_JADWAL],
      studentRoutes: [CONFIG.ROUTES.SISWA_DASHBOARD],

      init() { window.addEventListener('hashchange', () => this.handleRouteChange()); this.handleRouteChange(); },
      getRoute() { return window.location.hash.slice(1) || CONFIG.ROUTES.HOME; },

      async handleRouteChange() {
        const route = this.getRoute();
        this.currentRoute = route;

        if (this.adminRoutes.includes(route) && !Auth.isAuthenticated()) { this.navigate(CONFIG.ROUTES.ADMIN_LOGIN); return; }
        if (this.studentRoutes.includes(route) && !StudentAuth.isAuthenticated()) { this.navigate(CONFIG.ROUTES.SISWA_LOGIN); return; }
        if (route === CONFIG.ROUTES.ADMIN_LOGIN && Auth.isAuthenticated()) { this.navigate(CONFIG.ROUTES.ADMIN_DASHBOARD); return; }
        if (route === CONFIG.ROUTES.SISWA_LOGIN && StudentAuth.isAuthenticated()) { this.navigate(CONFIG.ROUTES.SISWA_DASHBOARD); return; }

        let pageFn = this.routes[route];
        if (!pageFn) pageFn = this.routes[CONFIG.ROUTES.NOTFOUND];

        const app = document.getElementById('app');
        const content = typeof pageFn === 'function' ? await pageFn() : pageFn;
        app.innerHTML = content;
        this.initPageScripts(route);
        window.scrollTo(0, 0);
      },

      navigate(route) { window.location.hash = route; },

      initPageScripts(route) {
        if (route === CONFIG.ROUTES.ADMIN_LOGIN) document.getElementById('admin-login-form')?.addEventListener('submit', handleAdminLogin);
        if (route === CONFIG.ROUTES.ADMIN_DASHBOARD) initSidebarToggle();
        if (route === CONFIG.ROUTES.ADMIN_JADWAL) { initSidebarToggle(); document.getElementById('jadwal-form')?.addEventListener('submit', handleJadwalSubmit); document.getElementById('search-jadwal')?.addEventListener('input', Utils.debounce(handleSearchJadwal, 300)); }
        if (route === CONFIG.ROUTES.SISWA_LOGIN) document.getElementById('siswa-login-form')?.addEventListener('submit', handleSiswaLogin);
        if (route === CONFIG.ROUTES.SISWA_DASHBOARD) document.getElementById('token-form')?.addEventListener('submit', handleTokenSubmit);
      }
    };

    // =============================================
    // EVENT HANDLERS
    // =============================================
    async function handleAdminLogin(e) {
      e.preventDefault();
      const form = e.target;
      const btn = form.querySelector('button[type="submit"]');
      btn.disabled = true; btn.innerHTML = '<div class="spinner w-5 h-5 mx-auto"></div>';
      
      const result = await Auth.login(form.username.value.trim(), form.password.value);
      if (result.success) { Toast.show(`Selamat datang, ${result.user.name}!`, 'success'); Router.navigate(CONFIG.ROUTES.ADMIN_DASHBOARD); }
      else { Toast.show(result.error, 'error'); btn.disabled = false; btn.textContent = 'Masuk'; }
    }

    async function handleSiswaLogin(e) {
      e.preventDefault();
      const form = e.target;
      const btn = form.querySelector('button[type="submit"]');
      btn.disabled = true; btn.innerHTML = '<div class="spinner w-5 h-5 mx-auto"></div>';
      
      const result = await StudentAuth.login(form.nisn.value.trim());
      if (result.success) { Toast.show(`Selamat datang, ${result.student.nama}!`, 'success'); Router.navigate(CONFIG.ROUTES.SISWA_DASHBOARD); }
      else { Toast.show(result.error, 'error'); btn.disabled = false; btn.textContent = 'Masuk'; }
    }

    async function handleJadwalSubmit(e) {
      e.preventDefault();
      const form = e.target;
      const formData = new FormData(form);
      const id = formData.get('id');
      const data = { kelas: formData.get('kelas'), ruang: formData.get('ruang'), mapel: formData.get('mapel'), tanggal: formData.get('tanggal'), waktu: formData.get('waktu'), token: formData.get('token').toUpperCase(), link: formData.get('link') };

      let result;
      if (id) result = await API.request('updateJadwal', { id, ...data });
      else result = await API.request('createJadwal', data);

      if (result.success) { Toast.show(id ? 'Jadwal berhasil diperbarui' : 'Jadwal berhasil ditambahkan', 'success'); Modal.close('jadwal-modal'); Router.handleRouteChange(); }
      else Toast.show(result.error, 'error');
    }

    function handleSearchJadwal(e) {
      const query = e.target.value.toLowerCase();
      document.querySelectorAll('.jadwal-row').forEach(row => { row.style.display = row.dataset.search.includes(query) ? '' : 'none'; });
    }

    async function handleTokenSubmit(e) {
      e.preventDefault();
      const form = e.target;
      const jadwalId = form.jadwalId.value;
      const tokenInput = form.tokenInput.value.toUpperCase();
      const jadwal = Store.jadwal.getAll().find(j => j.id === jadwalId);
      if (!jadwal) { Toast.show('Jadwal tidak ditemukan', 'error'); return; }
      if (jadwal.token !== tokenInput) { Toast.show('Token tidak valid', 'error'); return; }
      if (jadwal.link && Utils.isValidUrl(jadwal.link)) { Toast.show('Redirect ke halaman ujian...', 'success'); setTimeout(() => window.open(jadwal.link, '_blank'), 500); Modal.close('token-modal'); }
      else Toast.show('Link ujian tidak tersedia', 'warning');
    }

    // =============================================
    // HELPER FUNCTIONS
    // =============================================
    function toggleSidebar() { document.getElementById('sidebar')?.classList.toggle('mobile-menu-open'); document.getElementById('sidebar-overlay')?.classList.toggle('hidden'); }
    function initSidebarToggle() { document.querySelectorAll('.nav-link').forEach(link => { link.addEventListener('click', () => { if (window.innerWidth < 1024) toggleSidebar(); }); }); }
    
    function openAddModal() {
      document.getElementById('modal-title').textContent = 'Tambah Jadwal';
      document.getElementById('jadwal-form').reset();
      document.getElementById('jadwal-id').value = '';
      document.getElementById('jadwal-tanggal').value = new Date().toISOString().split('T')[0];
      document.getElementById('jadwal-token').value = Utils.generateToken();
      Modal.open('jadwal-modal');
    }

    function openEditModal(id) {
      const jadwal = Store.jadwal.getAll().find(j => j.id === id);
      if (!jadwal) return;
      document.getElementById('modal-title').textContent = 'Edit Jadwal';
      document.getElementById('jadwal-id').value = jadwal.id;
      document.getElementById('jadwal-kelas').value = jadwal.kelas;
      document.getElementById('jadwal-ruang').value = jadwal.ruang;
      document.getElementById('jadwal-mapel').value = jadwal.mapel || '';
      document.getElementById('jadwal-tanggal').value = jadwal.tanggal || '';
      document.getElementById('jadwal-waktu').value = jadwal.waktu || '';
      document.getElementById('jadwal-token').value = jadwal.token || '';
      document.getElementById('jadwal-link').value = jadwal.link || '';
      Modal.open('jadwal-modal');
    }

    async function deleteJadwal(id) {
      if (!confirm('Hapus jadwal ini?')) return;
      const result = await API.request('deleteJadwal', { id });
      if (result.success) { Toast.show('Jadwal berhasil dihapus', 'success'); Router.handleRouteChange(); }
      else Toast.show(result.error, 'error');
    }

    function generateTokenInForm() { document.getElementById('jadwal-token').value = Utils.generateToken(); }

    function openTokenModal(jadwalId, mapel) {
      document.getElementById('token-jadwal-id').value = jadwalId;
      document.getElementById('token-modal-subtitle').textContent = mapel;
      document.getElementById('token-input').value = '';
      Modal.open('token-modal');
      setTimeout(() => document.getElementById('token-input').focus(), 100);
    }

    // =============================================
    // INIT
    // =============================================
    document.addEventListener('DOMContentLoaded', () => { Toast.init(); Auth.init(); StudentAuth.init(); Router.init(); });
  </script>
</body>
</html>
